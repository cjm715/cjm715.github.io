<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <style>
      .bg { fill: #f5f4ef; }
      .panel { fill: #fffdfa; stroke: #202020; stroke-width: 3; rx: 28; ry: 28; }
      .title { font: 700 34px Arial, sans-serif; fill: #111111; }
      .subtitle { font: 700 24px Arial, sans-serif; fill: #111111; }
      .label { font: 500 21px Arial, sans-serif; fill: #222222; }
      .small { font: 500 18px Arial, sans-serif; fill: #333333; }
      .tiny { font: 500 16px Arial, sans-serif; fill: #444444; }
      .math { font: italic 22px Georgia, serif; fill: #111111; }
      .wire { stroke: #2c2c2c; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .accent { stroke: #1769aa; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .orange { stroke: #c56a1a; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .green { stroke: #2f7d4a; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 12 10; }
      .block-blue { fill: #dbeeff; stroke: #1769aa; stroke-width: 3; rx: 16; ry: 16; }
      .block-orange { fill: #fde7d1; stroke: #c56a1a; stroke-width: 3; rx: 16; ry: 16; }
      .block-green { fill: #dff2e5; stroke: #2f7d4a; stroke-width: 3; rx: 16; ry: 16; }
      .block-gray { fill: #ededed; stroke: #585858; stroke-width: 3; rx: 16; ry: 16; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2c2c2c"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1769aa"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#c56a1a"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f7d4a"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1080"/>
  <text class="title" x="70" y="70">Predictive Coding Analog Hardware Plan</text>
  <text class="label" x="70" y="108">Concept diagram for the proposed mixed-signal implementation of prediction, error, and phased updates.</text>

  <rect class="panel" x="60" y="150" width="1480" height="260"/>
  <text class="subtitle" x="90" y="195">1. Prediction Path</text>
  <text class="small" x="90" y="225">Weighted analog sum, then bounded nonlinearity to produce the layer prediction.</text>

  <rect class="block-gray" x="110" y="265" width="150" height="58"/>
  <text class="math" x="155" y="302">x₁⁽ˡ⁻¹⁾</text>
  <rect class="block-gray" x="110" y="335" width="150" height="58"/>
  <text class="math" x="155" y="372">x₂⁽ˡ⁻¹⁾</text>
  <rect class="block-gray" x="110" y="405" width="150" height="58"/>
  <text class="math" x="155" y="442">xₖ⁽ˡ⁻¹⁾</text>

  <line class="wire" x1="260" y1="294" x2="340" y2="294"/>
  <line class="wire" x1="260" y1="364" x2="340" y2="364"/>
  <line class="wire" x1="260" y1="434" x2="340" y2="434"/>

  <rect class="block-blue" x="340" y="265" width="130" height="58"/>
  <rect class="block-blue" x="340" y="335" width="130" height="58"/>
  <rect class="block-blue" x="340" y="405" width="130" height="58"/>
  <text class="small" x="378" y="301">w₁ᶦ</text>
  <text class="small" x="378" y="371">w₂ᶦ</text>
  <text class="small" x="378" y="441">wₖᶦ</text>

  <line class="wire" x1="470" y1="294" x2="560" y2="294"/>
  <line class="wire" x1="470" y1="364" x2="560" y2="364"/>
  <line class="wire" x1="470" y1="434" x2="560" y2="434"/>
  <line class="wire" x1="560" y1="294" x2="560" y2="434"/>

  <polygon points="560,315 675,364 560,413" fill="#fffdfa" stroke="#202020" stroke-width="4"/>
  <text class="small" x="596" y="355">R-sum</text>
  <text class="small" x="602" y="382">op-amp</text>
  <line class="wire" x1="675" y1="364" x2="770" y2="364" marker-end="url(#arrow)"/>

  <rect class="block-green" x="770" y="322" width="170" height="84"/>
  <text class="small" x="806" y="358">clip / saturate</text>
  <text class="tiny" x="805" y="386">bounded activation</text>
  <line class="green" x1="940" y1="364" x2="1040" y2="364" marker-end="url(#arrowGreen)"/>

  <rect class="block-gray" x="1040" y="332" width="170" height="64"/>
  <text class="math" x="1076" y="372">x̂ᵢ⁽ˡ⁾</text>

  <rect class="block-orange" x="1260" y="300" width="220" height="124"/>
  <text class="small" x="1292" y="340">Hardware options</text>
  <text class="tiny" x="1285" y="372">• resistor ladder or gm cell</text>
  <text class="tiny" x="1285" y="398">• clipped op-amp stage</text>
  <text class="tiny" x="1285" y="424">• low-bit or switched weights</text>

  <rect class="panel" x="60" y="450" width="1480" height="270"/>
  <text class="subtitle" x="90" y="495">2. L1 Error and Local Update Signals</text>
  <text class="small" x="90" y="525">Subtract actual and predicted states, then use comparator-like sign blocks to drive local updates.</text>

  <rect class="block-gray" x="120" y="585" width="170" height="64"/>
  <text class="math" x="160" y="625">xᵢ⁽ˡ⁾</text>
  <rect class="block-gray" x="120" y="655" width="170" height="64"/>
  <text class="math" x="152" y="695">x̂ᵢ⁽ˡ⁾</text>
  <line class="wire" x1="290" y1="617" x2="390" y2="617"/>
  <line class="wire" x1="290" y1="687" x2="390" y2="687"/>

  <rect class="block-orange" x="390" y="595" width="150" height="114"/>
  <text class="small" x="437" y="635">subtract</text>
  <text class="math" x="429" y="673">eᵢ⁽ˡ⁾</text>
  <line class="orange" x1="540" y1="652" x2="660" y2="652" marker-end="url(#arrowOrange)"/>

  <rect class="block-orange" x="660" y="598" width="190" height="108"/>
  <text class="small" x="706" y="634">sign / deadzone</text>
  <text class="tiny" x="704" y="664">comparator pair</text>
  <text class="math" x="728" y="692">sign(eᵢ⁽ˡ⁾)</text>

  <line class="wire dash" x1="755" y1="598" x2="755" y2="545"/>
  <text class="tiny" x="690" y="540">implements L1-style drive</text>

  <line class="orange" x1="850" y1="632" x2="970" y2="632" marker-end="url(#arrowOrange)"/>
  <line class="accent" x1="850" y1="672" x2="970" y2="672" marker-end="url(#arrowBlue)"/>

  <rect class="block-blue" x="970" y="580" width="220" height="62"/>
  <text class="small" x="1004" y="618">state update current</text>
  <rect class="block-blue" x="970" y="650" width="220" height="62"/>
  <text class="small" x="994" y="688">weight pulse generator</text>

  <rect class="block-gray" x="1240" y="575" width="150" height="58"/>
  <text class="math" x="1275" y="612">xⱼ⁽ˡ⁻¹⁾</text>
  <line class="wire" x1="1390" y1="604" x2="1450" y2="604"/>
  <line class="accent" x1="1320" y1="633" x2="1320" y2="681"/>
  <line class="accent" x1="1190" y1="681" x2="1450" y2="681" marker-end="url(#arrowBlue)"/>
  <text class="tiny" x="1208" y="668">sign(eᵢ⁽ˡ⁾) gated with presynaptic state</text>

  <rect class="panel" x="60" y="760" width="1480" height="260"/>
  <text class="subtitle" x="90" y="805">3. Two-Phase Operation for Analog Training</text>
  <text class="small" x="90" y="835">Alternate between state relaxation and weight adaptation instead of updating everything continuously.</text>

  <line class="wire" x1="140" y1="920" x2="1440" y2="920"/>
  <line class="wire" x1="240" y1="890" x2="240" y2="950"/>
  <line class="wire" x1="780" y1="890" x2="780" y2="950"/>
  <line class="wire" x1="1180" y1="890" x2="1180" y2="950"/>

  <rect class="block-green" x="240" y="875" width="540" height="90"/>
  <text class="small" x="435" y="913">Phase A: state relaxation</text>
  <text class="tiny" x="318" y="943">input and target clamped, weights fixed, hidden states settle</text>

  <rect class="block-orange" x="780" y="875" width="400" height="90"/>
  <text class="small" x="908" y="913">Phase B: weight update</text>
  <text class="tiny" x="846" y="943">states sampled or held, local pulses update coarse weights</text>

  <rect class="block-gray" x="1180" y="875" width="190" height="90"/>
  <text class="small" x="1236" y="913">repeat</text>
  <text class="tiny" x="1210" y="943">next sample or next cycle</text>

  <line class="green" x1="510" y1="860" x2="510" y2="825" marker-end="url(#arrowGreen)"/>
  <text class="tiny" x="422" y="818">neuronal dynamics active</text>
  <line class="orange" x1="980" y1="860" x2="980" y2="825" marker-end="url(#arrowOrange)"/>
  <text class="tiny" x="870" y="818">weight dynamics active</text>

  <text class="tiny" x="136" y="994">This is a conceptual architecture: the goal is to preserve the predictive coding update pattern while mapping it to practical mixed-signal blocks.</text>
</svg>
